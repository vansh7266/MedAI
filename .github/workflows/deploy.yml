name: Deploy to Google Cloud

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push Docker image
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/medai-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy medai-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/medai-backend:${{ github.sha }} \
            --region ${{ secrets.GCP_REGION }} \
            --memory 2Gi \
            --cpu 1 \
            --max-instances 3 \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_CLOUD_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=us-central1
